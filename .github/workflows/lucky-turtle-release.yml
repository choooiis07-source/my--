name: Lucky Turtle Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'lucky-turtle-v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: lucky-turtle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: lucky-turtle/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer from current source
        run: npm run dist:win

      - name: Package Windows installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "Lucky-Turtle-Setup-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not created."
          }
          Compress-Archive `
            -LiteralPath $installer.FullName `
            -DestinationPath "release/Lucky-Turtle-Windows.zip" `
            -CompressionLevel Optimal

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release/Lucky-Turtle-Windows.zip" `
            --title "Lucky Turtle ${{ github.ref_name }}" `
            --notes "최신 행운의 거북이 Windows 버전입니다. 거북이 드래그 이동, 더 정확한 세로줄 감지, 항상 위 유지, 상세페이지 터치 데모 개선이 포함되어 있습니다."
