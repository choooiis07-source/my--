name: Lucky Turtle Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'lucky-turtle-v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: lucky-turtle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble verified Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $base = "https://lucky-turtle.vercel.app/downloads/Lucky-Turtle-Setup-0.1.0.exe.part"
          0..2 | ForEach-Object { Invoke-WebRequest "$base$_" -OutFile "release/part$_" }
          $output = [IO.File]::Create("release/Lucky-Turtle-Setup-0.1.0.exe")
          0..2 | ForEach-Object {
            $input = [IO.File]::OpenRead("release/part$_")
            $input.CopyTo($output)
            $input.Dispose()
          }
          $output.Dispose()
          $hash = (Get-FileHash "release/Lucky-Turtle-Setup-0.1.0.exe" -Algorithm SHA256).Hash
          if ($hash -ne "9CCFF24ED78C78133654DE82DB6139F09A99D2E257D0EB262C68DE3327B4D853") {
            throw "Installer checksum mismatch: $hash"
          }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release/Lucky-Turtle-Setup-0.1.0.exe" `
            --title "Lucky Turtle 0.1.0" `
            --notes "행운의 거북이 Windows 베타 첫 공개 버전입니다. 설치 파일을 내려받아 실행하면 거북이가 화면 위를 산책합니다."
